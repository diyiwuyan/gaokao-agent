<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考志愿填报 AI - 在线对话</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
            --accent: #f59e0b;
            --success: #22c55e;
            --gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .header .avatar {
            width: 40px; height: 40px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .header .title { font-weight: 700; font-size: 1.1rem; }
        .header .subtitle { font-size: 0.8rem; color: var(--text-dim); }
        .header .status-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header-right a, .header-right button {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s;
            background: transparent;
            cursor: pointer;
        }
        .header-right a:hover, .header-right button:hover { border-color: var(--primary); color: var(--primary); }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            background: var(--bg);
            border-radius: 8px;
            padding: 2px;
            border: 1px solid var(--border);
        }
        .mode-btn {
            padding: 0.35rem 0.75rem;
            border: none;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-dim);
        }
        .mode-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .msg { display: flex; gap: 0.75rem; max-width: 85%; animation: fadeIn 0.3s ease; }
        .msg-user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-ai { align-self: flex-start; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .msg-ai .msg-avatar { background: var(--gradient); }
        .msg-user .msg-avatar { background: #374151; }

        .msg-bubble {
            padding: 0.875rem 1.25rem;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg-user .msg-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-ai .msg-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Typing indicator */
        .typing { display: flex; gap: 4px; padding: 0.5rem 0; }
        .typing span {
            width: 8px; height: 8px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

        /* Welcome */
        .welcome {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-dim);
        }
        .welcome h2 { color: var(--text); margin-bottom: 0.75rem; font-size: 1.5rem; }
        .welcome p { margin-bottom: 1.5rem; }
        .quick-asks {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }
        .quick-ask {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-ask:hover { border-color: var(--primary); color: #60a5fa; }

        /* Input Area */
        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
        }
        .input-wrap {
            display: flex;
            gap: 0.75rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .input-wrap textarea {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 120px;
            transition: border-color 0.2s;
        }
        .input-wrap textarea:focus { border-color: var(--primary); }
        .input-wrap textarea::placeholder { color: var(--text-dim); }

        .send-btn {
            width: 44px; height: 44px;
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            align-self: flex-end;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(37,99,235,0.4); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .input-hint {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        /* ============ 结构化表单模式 ============ */
        .form-panel {
            display: none;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
        }
        .form-panel.active { display: block; }
        .form-inner {
            max-width: 900px;
            margin: 0 auto;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .form-group label {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 500;
        }
        .form-group select,
        .form-group input {
            padding: 0.6rem 0.8rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group select:focus,
        .form-group input:focus { border-color: var(--primary); }

        .form-extra {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }
        .form-extra .form-group { flex: 1; }
        .form-submit-btn {
            padding: 0.6rem 1.5rem;
            background: var(--gradient);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .form-submit-btn:hover { transform: scale(1.02); box-shadow: 0 4px 15px rgba(37,99,235,0.4); }
        .form-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Settings Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
        }
        .modal h3 { margin-bottom: 1rem; }
        .modal label { display: block; color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.25rem; margin-top: 1rem; }
        .modal input, .modal select {
            width: 100%;
            padding: 0.6rem 0.8rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
        }
        .modal input:focus { border-color: var(--primary); }
        .modal .btn-row { display: flex; gap: 0.75rem; margin-top: 1.5rem; justify-content: flex-end; }
        .modal .btn-row button {
            padding: 0.5rem 1.25rem;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn-cancel { background: var(--border); color: var(--text); }
        .btn-save { background: var(--primary); color: white; }

        /* Responsive */
        @media (max-width: 600px) {
            .msg { max-width: 95%; }
            .messages { padding: 1rem; }
            .quick-asks { flex-direction: column; align-items: center; }
            .form-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="avatar">🎓</div>
            <div>
                <div class="title">志愿哥 AI</div>
                <div class="subtitle"><span class="status-dot"></span>在线 · 2868所院校数据</div>
            </div>
        </div>
        <div class="header-right">
            <div class="mode-toggle">
                <button class="mode-btn active" id="modeFree" onclick="switchMode('free')">💬 自由对话</button>
                <button class="mode-btn" id="modeForm" onclick="switchMode('form')">📋 智能填报</button>
            </div>
            <a href="#" onclick="showSettings()">⚙️</a>
            <a href="./">← 首页</a>
        </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
        <div class="welcome" id="welcome">
            <h2>👋 你好，我是志愿哥</h2>
            <p>我是基于 AI Agent 的高考志愿填报助手，数据覆盖全国 2868 所院校。<br>告诉我你的分数、省份和意向，我来帮你分析！</p>
            <div class="quick-asks">
                <div class="quick-ask" onclick="quickAsk(this)">我是山东考生，考了620分，物理类</div>
                <div class="quick-ask" onclick="quickAsk(this)">帮我查一下浙江大学计算机的录取分</div>
                <div class="quick-ask" onclick="quickAsk(this)">什么是平行志愿？</div>
                <div class="quick-ask" onclick="quickAsk(this)">650分能上哪些985？</div>
            </div>
        </div>
    </div>

    <!-- 自由对话输入区 -->
    <div class="input-area" id="freeInputArea">
        <div class="input-wrap">
            <textarea id="input" placeholder="输入你的问题，例如：我是山东物理类考生，620分能上哪些学校？" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="input-hint">按 Enter 发送，Shift+Enter 换行 · 切换到「智能填报」模式可快速结构化输入</div>
    </div>

    <!-- 结构化表单输入区 -->
    <div class="form-panel" id="formPanel">
        <div class="form-inner">
            <div class="form-grid">
                <div class="form-group">
                    <label>📅 高考年份</label>
                    <select id="formYear">
                        <option value="2025" selected>2025年</option>
                        <option value="2024">2024年</option>
                        <option value="2023">2023年</option>
                        <option value="2022">2022年</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📍 考生省份</label>
                    <select id="formProvince">
                        <option value="">请选择省份</option>
                        <option>北京</option><option>天津</option><option>河北</option><option>山西</option>
                        <option>内蒙古</option><option>辽宁</option><option>吉林</option><option>黑龙江</option>
                        <option>上海</option><option>江苏</option><option>浙江</option><option>安徽</option>
                        <option>福建</option><option>江西</option><option>山东</option><option>河南</option>
                        <option>湖北</option><option>湖南</option><option>广东</option><option>广西</option>
                        <option>海南</option><option>重庆</option><option>四川</option><option>贵州</option>
                        <option>云南</option><option>西藏</option><option>陕西</option><option>甘肃</option>
                        <option>青海</option><option>宁夏</option><option>新疆</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📝 科类</label>
                    <select id="formCategory">
                        <option value="物理类">物理类（理科）</option>
                        <option value="历史类">历史类（文科）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🎯 高考分数</label>
                    <input type="number" id="formScore" placeholder="如 620" min="100" max="750">
                </div>
                <div class="form-group">
                    <label>📊 省排名/位次（选填）</label>
                    <input type="number" id="formRank" placeholder="如 15000">
                </div>
                <div class="form-group">
                    <label>💡 意向（选填）</label>
                    <input type="text" id="formPreference" placeholder="如 计算机、留在省内">
                </div>
            </div>
            <div class="form-extra">
                <div class="form-group" style="flex:2">
                    <label>🎯 填报目标</label>
                    <select id="formGoal">
                        <option value="冲稳保方案">生成冲-稳-保三档方案</option>
                        <option value="概率分析">分析某校录取概率</option>
                        <option value="院校推荐">推荐适合的院校</option>
                        <option value="专业推荐">推荐适合的专业</option>
                    </select>
                </div>
                <button class="form-submit-btn" id="formSubmitBtn" onclick="submitForm()">🚀 开始分析</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h3>⚙️ 设置</h3>
            <label>后端 API 地址（Vercel 部署后自动填入）</label>
            <input id="apiUrl" placeholder="https://gaokao-agent.vercel.app">
            <p style="font-size:0.75rem;color:var(--text-dim);margin-top:0.5rem">
                部署在 Vercel 上，国内访问流畅。首次调用可能需要几秒冷启动。<br>
                本地调试可填 <code>http://localhost:8000</code>
            </p>
            <div class="btn-row">
                <button class="btn-cancel" onclick="closeSettings()">取消</button>
                <button class="btn-save" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ============ 配置 ============
        const DEFAULT_API = 'https://gaokao-agent.vercel.app';

        let API_URL = localStorage.getItem('gaokao_api_url') || DEFAULT_API;
        let chatHistory = [];
        let isLoading = false;
        let currentMode = 'free'; // 'free' | 'form'

        // ============ 模式切换 ============
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('modeFree').classList.toggle('active', mode === 'free');
            document.getElementById('modeForm').classList.toggle('active', mode === 'form');
            document.getElementById('freeInputArea').style.display = mode === 'free' ? 'block' : 'none';
            document.getElementById('formPanel').classList.toggle('active', mode === 'form');
        }

        // ============ 结构化表单提交 ============
        function submitForm() {
            const year = document.getElementById('formYear').value;
            const province = document.getElementById('formProvince').value;
            const category = document.getElementById('formCategory').value;
            const score = document.getElementById('formScore').value;
            const rank = document.getElementById('formRank').value;
            const preference = document.getElementById('formPreference').value;
            const goal = document.getElementById('formGoal').value;

            // 校验必填项
            if (!province) { alert('请选择省份'); return; }
            if (!score) { alert('请输入高考分数'); return; }

            // 组装结构化提问
            let message = `【${year}年高考志愿填报咨询】\n`;
            message += `📍 省份：${province}\n`;
            message += `📝 科类：${category}\n`;
            message += `🎯 分数：${score}分\n`;
            if (rank) message += `📊 位次：${rank}\n`;
            if (preference) message += `💡 意向偏好：${preference}\n`;
            message += `\n请求：请帮我${goal}。`;
            if (goal === '冲稳保方案') {
                message += `请给出"冲"（录取概率20-40%）、"稳"（60-80%）、"保"（>90%）三档各3-5所院校，附上近年录取分数和位次数据。`;
            }

            // 通过对话发送
            document.getElementById('input').value = message;
            switchMode('free');
            sendMessage();
        }

        // ============ UI 工具函数 ============
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function scrollToBottom() {
            const msgs = document.getElementById('messages');
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addMessage(content, role) {
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg msg-${role}`;
            div.innerHTML = `
                <div class="msg-avatar">${role === 'ai' ? '🎓' : '👤'}</div>
                <div class="msg-bubble">${escapeHtml(content)}</div>
            `;
            msgs.appendChild(div);
            scrollToBottom();
            return div;
        }

        function addTyping() {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg msg-ai';
            div.id = 'typing';
            div.innerHTML = `
                <div class="msg-avatar">🎓</div>
                <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
            `;
            msgs.appendChild(div);
            scrollToBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ 核心逻辑 ============
        async function sendMessage() {
            if (isLoading) return;

            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;

            // 显示用户消息
            addMessage(message, 'user');
            chatHistory.push({ role: 'user', content: message });
            input.value = '';
            input.style.height = 'auto';

            // 禁用输入
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            addTyping();

            try {
                const res = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        history: chatHistory.slice(0, -1),
                    }),
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({ error: res.statusText }));
                    throw new Error(err.error || err.detail || `HTTP ${res.status}`);
                }

                const data = await res.json();
                const reply = data.reply;

                chatHistory.push({ role: 'assistant', content: reply });
                removeTyping();
                addMessage(reply, 'ai');

            } catch (err) {
                removeTyping();
                let errMsg = `⚠️ 连接失败: ${err.message}`;
                if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
                    errMsg = '⚠️ 无法连接后端服务。可能原因：\n1. Vercel 冷启动中（等几秒再试）\n2. API 地址不正确（点右上角⚙️设置）\n3. 后端未部署到 Vercel';
                }
                addMessage(errMsg, 'ai');
                chatHistory.pop();
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
                input.focus();
            }
        }

        function quickAsk(el) {
            document.getElementById('input').value = el.textContent;
            sendMessage();
        }

        // ============ 设置 ============
        function showSettings() {
            document.getElementById('apiUrl').value = API_URL;
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        function saveSettings() {
            const url = document.getElementById('apiUrl').value.trim().replace(/\/+$/, '');
            if (url) {
                API_URL = url;
                localStorage.setItem('gaokao_api_url', url);
                closeSettings();
            } else {
                alert('请输入有效的 API 地址');
            }
        }

        // ============ 初始化 ============
        document.getElementById('input').focus();
    </script>
</body>
</html>
