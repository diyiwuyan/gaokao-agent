<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考志愿填报 AI - 在线对话</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --border: #334155;
            --accent: #f59e0b;
            --success: #22c55e;
            --gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .header .avatar {
            width: 40px; height: 40px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .header .title { font-weight: 700; font-size: 1.1rem; }
        .header .subtitle { font-size: 0.8rem; color: var(--text-dim); }
        .header .status-dot {
            width: 8px; height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .header-right a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .header-right a:hover { border-color: var(--primary); color: var(--primary); }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            background: var(--bg);
            border-radius: 8px;
            padding: 2px;
            border: 1px solid var(--border);
        }
        .mode-btn {
            padding: 0.35rem 0.6rem;
            border: none;
            border-radius: 6px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--text-dim);
            white-space: nowrap;
        }
        .mode-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .msg { display: flex; gap: 0.75rem; max-width: 85%; animation: fadeIn 0.3s ease; }
        .msg-user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-ai { align-self: flex-start; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .msg-ai .msg-avatar { background: var(--gradient); }
        .msg-user .msg-avatar { background: #374151; }

        .msg-bubble {
            padding: 0.875rem 1.25rem;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg-user .msg-bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-ai .msg-bubble {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* Typing indicator */
        .typing { display: flex; gap: 4px; padding: 0.5rem 0; }
        .typing span {
            width: 8px; height: 8px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

        /* Welcome */
        .welcome {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--text-dim);
        }
        .welcome h2 { color: var(--text); margin-bottom: 0.75rem; font-size: 1.5rem; }
        .welcome p { margin-bottom: 1.5rem; line-height: 1.6; }
        .quick-asks {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }
        .quick-ask {
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-ask:hover { border-color: var(--primary); color: #60a5fa; }

        /* Input Area */
        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
        }
        .input-wrap {
            display: flex;
            gap: 0.75rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .input-wrap textarea {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 120px;
            transition: border-color 0.2s;
        }
        .input-wrap textarea:focus { border-color: var(--primary); }
        .input-wrap textarea::placeholder { color: var(--text-dim); }

        .send-btn {
            width: 44px; height: 44px;
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            align-self: flex-end;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(37,99,235,0.4); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .input-hint {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        /* ============ 结构化表单模式 ============ */
        .form-panel {
            display: none;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
        }
        .form-panel.active { display: block; }
        .form-inner {
            max-width: 900px;
            margin: 0 auto;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .form-group label {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 500;
        }
        .form-group select,
        .form-group input {
            padding: 0.6rem 0.8rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group select:focus,
        .form-group input:focus { border-color: var(--primary); }

        .form-row {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            margin-top: 0.5rem;
        }
        .form-row .form-group { flex: 1; }
        .form-submit-btn {
            padding: 0.6rem 1.5rem;
            background: var(--gradient);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .form-submit-btn:hover { transform: scale(1.02); box-shadow: 0 4px 15px rgba(37,99,235,0.4); }
        .form-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Responsive */
        @media (max-width: 600px) {
            .msg { max-width: 95%; }
            .messages { padding: 1rem; }
            .quick-asks { flex-direction: column; align-items: center; }
            .form-grid { grid-template-columns: 1fr 1fr; }
            .mode-toggle { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="avatar">🎓</div>
            <div>
                <div class="title">志愿哥 AI</div>
                <div class="subtitle"><span class="status-dot"></span>在线 · 2868所院校 · 500+专业</div>
            </div>
        </div>
        <div class="header-right">
            <div class="mode-toggle">
                <button class="mode-btn active" id="modeFree" onclick="switchMode('free')">💬 自由对话</button>
                <button class="mode-btn" id="modeForm" onclick="switchMode('form')">📋 快速填报</button>
                <button class="mode-btn" id="modeGuide" onclick="switchMode('guide')">🧭 引导咨询</button>
            </div>
            <a href="./">← 首页</a>
        </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
        <div class="welcome" id="welcome">
            <h2>👋 你好，我是志愿哥</h2>
            <p>AI 高考志愿填报助手，覆盖全国 2868 所院校、500+ 专业。<br>我不仅能推荐学校，还能根据你的兴趣和性格推荐最适合的专业方向！</p>
            <div class="quick-asks">
                <div class="quick-ask" onclick="quickAsk(this)">山东物理类620分，推荐学校和专业</div>
                <div class="quick-ask" onclick="quickAsk(this)">我喜欢编程，适合什么专业？</div>
                <div class="quick-ask" onclick="quickAsk(this)">计算机专业哪些学校好？</div>
                <div class="quick-ask" onclick="quickAsk(this)">650分能上哪些985？</div>
            </div>
        </div>
    </div>

    <!-- 自由对话输入区 -->
    <div class="input-area" id="freeInputArea">
        <div class="input-wrap">
            <textarea id="input" placeholder="输入你的问题，例如：山东物理620分，喜欢计算机，推荐学校和专业" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="input-hint">Enter 发送 · Shift+Enter 换行 · 试试「引导咨询」模式获得更精准推荐</div>
    </div>

    <!-- 结构化表单输入区 -->
    <div class="form-panel" id="formPanel">
        <div class="form-inner">
            <div class="form-grid">
                <div class="form-group">
                    <label>📅 年份</label>
                    <select id="formYear">
                        <option value="2025" selected>2025</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📍 省份</label>
                    <select id="formProvince">
                        <option value="">选择省份</option>
                        <option>北京</option><option>天津</option><option>河北</option><option>山西</option>
                        <option>内蒙古</option><option>辽宁</option><option>吉林</option><option>黑龙江</option>
                        <option>上海</option><option>江苏</option><option>浙江</option><option>安徽</option>
                        <option>福建</option><option>江西</option><option>山东</option><option>河南</option>
                        <option>湖北</option><option>湖南</option><option>广东</option><option>广西</option>
                        <option>海南</option><option>重庆</option><option>四川</option><option>贵州</option>
                        <option>云南</option><option>西藏</option><option>陕西</option><option>甘肃</option>
                        <option>青海</option><option>宁夏</option><option>新疆</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📝 科类</label>
                    <select id="formCategory">
                        <option value="物理类">物理类</option>
                        <option value="历史类">历史类</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🎯 分数</label>
                    <input type="number" id="formScore" placeholder="如620" min="100" max="750">
                </div>
                <div class="form-group">
                    <label>📊 位次(选填)</label>
                    <input type="number" id="formRank" placeholder="如15000">
                </div>
                <div class="form-group">
                    <label>💡 意向专业(选填)</label>
                    <input type="text" id="formMajor" placeholder="如计算机、金融">
                </div>
                <div class="form-group">
                    <label>🏙️ 城市偏好(选填)</label>
                    <input type="text" id="formCity" placeholder="如北京、留省内">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>🎯 需求</label>
                    <select id="formGoal">
                        <option value="冲稳保方案（含专业推荐）">生成冲-稳-保方案（含专业）</option>
                        <option value="专业方向推荐">帮我选专业方向</option>
                        <option value="某校录取概率分析">分析某校录取概率</option>
                        <option value="同分段院校对比">同分段院校对比</option>
                    </select>
                </div>
                <button class="form-submit-btn" id="formSubmitBtn" onclick="submitForm()">🚀 开始分析</button>
            </div>
        </div>
    </div>

    <script>
        // ============ 配置 ============
        const API_URL = 'https://gaokao-agent-api.diyiwuyan.workers.dev';

        let chatHistory = [];
        let isLoading = false;
        let currentMode = 'free'; // 'free' | 'form' | 'guide'

        // ============ 模式切换 ============
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('modeFree').classList.toggle('active', mode === 'free');
            document.getElementById('modeForm').classList.toggle('active', mode === 'form');
            document.getElementById('modeGuide').classList.toggle('active', mode === 'guide');
            document.getElementById('freeInputArea').style.display = (mode === 'free' || mode === 'guide') ? 'block' : 'none';
            document.getElementById('formPanel').classList.toggle('active', mode === 'form');

            // 引导模式自动发起对话
            if (mode === 'guide') {
                startGuidedMode();
            }
        }

        // ============ 引导式问答模式 ============
        function startGuidedMode() {
            // 清空历史开始新对话
            chatHistory = [];
            const msgs = document.getElementById('messages');
            msgs.innerHTML = '';

            const guideMessage = '请你以引导式咨询模式和我对话。一步一步问我问题，先从基本信息开始（省份、科类、分数），然后问我的兴趣爱好、性格特点、职业倾向、城市偏好等，最后综合给我推荐专业方向和学校。每次只问一个问题，等我回答后再问下一个。现在开始吧！';

            // 不显示这条系统指令给用户，直接发送
            chatHistory.push({ role: 'user', content: guideMessage });
            addTyping();
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;

            callAPI(guideMessage, []).then(reply => {
                removeTyping();
                chatHistory.push({ role: 'assistant', content: reply });
                addMessage(reply, 'ai');
            }).catch(err => {
                removeTyping();
                addMessage('⚠️ 连接失败: ' + err.message + '\n请检查网络后刷新重试。', 'ai');
            }).finally(() => {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            });
        }

        // ============ 结构化表单提交 ============
        function submitForm() {
            const year = document.getElementById('formYear').value;
            const province = document.getElementById('formProvince').value;
            const category = document.getElementById('formCategory').value;
            const score = document.getElementById('formScore').value;
            const rank = document.getElementById('formRank').value;
            const major = document.getElementById('formMajor').value;
            const city = document.getElementById('formCity').value;
            const goal = document.getElementById('formGoal').value;

            if (!province) { alert('请选择省份'); return; }
            if (!score) { alert('请输入高考分数'); return; }

            let message = `【${year}年高考志愿填报】\n`;
            message += `省份：${province} | 科类：${category} | 分数：${score}分`;
            if (rank) message += ` | 位次：${rank}`;
            message += '\n';
            if (major) message += `意向专业：${major}\n`;
            if (city) message += `城市偏好：${city}\n`;
            message += `\n请求：${goal}。`;
            if (goal.includes('冲稳保')) {
                message += '请给出冲（录取概率20-40%）、稳（60-80%）、保（>90%）三档各3-5所院校，每所学校推荐2-3个适合的专业，附上近年分数线。';
            } else if (goal.includes('专业方向')) {
                message += '请根据我的分数段，推荐5-8个适合的专业方向，说明每个专业的就业前景和推荐院校。';
            }

            // 切到自由对话模式显示结果
            switchMode('free');
            document.getElementById('input').value = message;
            sendMessage();
        }

        // ============ UI 工具函数 ============
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function scrollToBottom() {
            const msgs = document.getElementById('messages');
            msgs.scrollTop = msgs.scrollHeight;
        }

        function addMessage(content, role) {
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `msg msg-${role}`;
            div.innerHTML = `
                <div class="msg-avatar">${role === 'ai' ? '🎓' : '👤'}</div>
                <div class="msg-bubble">${escapeHtml(content)}</div>
            `;
            msgs.appendChild(div);
            scrollToBottom();
            return div;
        }

        function addTyping() {
            const msgs = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'msg msg-ai';
            div.id = 'typing';
            div.innerHTML = `
                <div class="msg-avatar">🎓</div>
                <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
            `;
            msgs.appendChild(div);
            scrollToBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============ API 调用 ============
        async function callAPI(message, history) {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message, history }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: res.statusText }));
                throw new Error(err.error || err.detail || `HTTP ${res.status}`);
            }

            const data = await res.json();
            return data.reply;
        }

        // ============ 发送消息 ============
        async function sendMessage() {
            if (isLoading) return;

            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            chatHistory.push({ role: 'user', content: message });
            input.value = '';
            input.style.height = 'auto';

            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            addTyping();

            try {
                const reply = await callAPI(message, chatHistory.slice(0, -1));
                chatHistory.push({ role: 'assistant', content: reply });
                removeTyping();
                addMessage(reply, 'ai');
            } catch (err) {
                removeTyping();
                let errMsg = '⚠️ 连接失败: ' + err.message;
                if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
                    errMsg = '⚠️ 无法连接 AI 服务，请检查网络后刷新重试。';
                }
                addMessage(errMsg, 'ai');
                chatHistory.pop();
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
                input.focus();
            }
        }

        function quickAsk(el) {
            document.getElementById('input').value = el.textContent;
            sendMessage();
        }

        // ============ 初始化 ============
        document.getElementById('input').focus();
    </script>
</body>
</html>
