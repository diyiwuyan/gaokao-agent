services:
  - type: web
    name: gaokao-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_MODEL
        value: deepseek-chat
      - key: DB_PATH
        value: ./data/gaokao.db
      - key: PYTHON_VERSION
        value: "3.11"
    plan: free
